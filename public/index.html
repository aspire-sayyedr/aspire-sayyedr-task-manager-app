<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Task Manager Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-6xl mx-auto p-6">

<!-- HEADER -->

<div class="flex justify-between items-center mb-6">

<h1 class="text-3xl font-bold">Task Manager</h1>

<div class="flex gap-3">
<input id="search" placeholder="Search task..."
class="border p-2 rounded w-60">

<button onclick="toggleDark()" 
class="bg-gray-800 text-white px-3 py-2 rounded">
Dark
</button>
</div>

</div>


<!-- DASHBOARD -->

<div class="grid grid-cols-3 gap-4 mb-6">

<div class="bg-white p-4 rounded shadow">
<h2 class="text-gray-500">Todo</h2>
<p id="todoCount" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white p-4 rounded shadow">
<h2 class="text-gray-500">In Progress</h2>
<p id="progressCount" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white p-4 rounded shadow">
<h2 class="text-gray-500">Done</h2>
<p id="doneCount" class="text-2xl font-bold">0</p>
</div>

</div>


<!-- ADD TASK -->

<div class="bg-white p-4 rounded shadow mb-6">

<div class="grid grid-cols-4 gap-3">

<input id="title" placeholder="Task title"
class="border p-2 rounded">

<input id="desc" placeholder="Description"
class="border p-2 rounded">

<input type="date" id="due"
class="border p-2 rounded">

<select id="status" class="border p-2 rounded">

<option value="todo">Todo</option>
<option value="progress">In Progress</option>
<option value="done">Done</option>

</select>

</div>

<button onclick="addTask()" 
class="mt-3 bg-blue-500 text-white px-4 py-2 rounded">
Add Task
</button>

</div>


<!-- KANBAN BOARD -->

<div class="grid grid-cols-3 gap-6">

<div>
<h2 class="font-bold mb-3">Todo</h2>
<ul id="todoList" class="space-y-3"></ul>
</div>

<div>
<h2 class="font-bold mb-3">In Progress</h2>
<ul id="progressList" class="space-y-3"></ul>
</div>

<div>
<h2 class="font-bold mb-3">Done</h2>
<ul id="doneList" class="space-y-3"></ul>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
